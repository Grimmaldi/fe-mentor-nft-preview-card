<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Frontend Mentor NFT Preview Card Challenge</title>
</head>
<body>
    <div class="container">
        <img class="nft-image" src="./assets/images/image-equilibrium.jpg" alt="The NFT image - a glowing cube balanced on one corner.">
        <div class="nft">
            <h1>Equilibrium #3429</h1>
            <p class="blurb">Our Equilibrium collection promotes balance and calm.</p>
            <div class="deal-info">
                <div class="price">
                    <img src="./assets/images/icon-ethereum.svg" alt="">
                    <p>0.041 ETH</p>
                </div>
                <div class="time-remaining">
                    <img src="./assets/images/icon-clock.svg" alt="">
                    <p>3 days left</p>
                </div>
            </div>
            <hr>
            <div class="creator">
                <img src="./assets/images/image-avatar.png" alt="">    
                <p>Creation of <a href="">Jules Wyvern</a></p>
            </div>
        </div>
    </div>
</body>
</html>
